<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>墨流し · Suminagashi</title>
<meta name="description" content="Tarayıcıda gerçek akışkan simülasyonuyla suminagashi (yüzen mürekkep) sanatı.">
<style>
  :root{
    --ink:#2a2620; --paper:#efe9da; --panel:rgba(244,239,228,.82);
    --line:rgba(60,50,38,.18); --accent:#5a6b8c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#0e0d0b;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Palatino Linotype","Book Antiqua",Georgia,serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}

  .brand{
    position:fixed;top:18px;left:0;right:0;text-align:center;pointer-events:none;
    color:rgba(50,42,32,.55);font-size:14px;letter-spacing:.32em;font-weight:400;
  }
  .brand b{font-size:18px;letter-spacing:.18em;display:block;margin-bottom:3px;color:rgba(40,34,26,.7)}

  .hint{
    position:fixed;top:50%;left:0;right:0;text-align:center;transform:translateY(-50%);
    color:rgba(50,42,32,.5);font-size:clamp(14px,2.4vw,19px);letter-spacing:.08em;
    pointer-events:none;transition:opacity .8s ease;padding:0 24px;
  }
  .hint.gone{opacity:0}

  .bar{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;
    background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:40px;padding:9px 16px;
    box-shadow:0 10px 34px rgba(0,0,0,.22);
  }
  .palette{display:flex;gap:9px}
  .dot{
    width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
    cursor:pointer;padding:0;transition:transform .15s, box-shadow .15s;
    box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .dot:hover{transform:translateY(-2px)}
  .dot.active{border-color:#fff;box-shadow:0 0 0 2px var(--ink),0 2px 6px rgba(0,0,0,.3)}
  .sep{width:1px;height:26px;background:var(--line)}
  .bar button.icon{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:rgba(255,255,255,.35);color:var(--ink);font-size:17px;cursor:pointer;
    display:grid;place-items:center;transition:.15s;line-height:1;
  }
  .bar button.icon:hover{background:#fff;border-color:rgba(60,50,38,.4)}
  .bar button.icon.on{background:var(--ink);color:var(--paper)}

  .fallback{position:fixed;inset:0;display:none;place-items:center;text-align:center;
    color:#cdbfa6;padding:30px;font-size:16px;line-height:1.7}
  .fallback.show{display:grid}
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="brand"><b>墨流し</b>suminagashi</div>
  <div class="hint" id="hint">dokun: damla bırak　·　sürükle: suyu karıştır</div>

  <div class="bar">
    <div class="palette" id="palette"></div>
    <span class="sep"></span>
    <button class="icon" id="clearBtn" title="Temizle">⟲</button>
    <button class="icon" id="saveBtn" title="İndir (PNG)">⤓</button>
    <button class="icon" id="soundBtn" title="Ortam sesi">♪</button>
  </div>

  <div class="fallback" id="fallback">
    Bu efekt için tarayıcınızda <b>WebGL2 + float buffer</b> desteği gerekiyor.<br>
    Güncel bir Chrome, Edge, Firefox veya Safari ile tekrar deneyin.
  </div>

<script>
"use strict";
(function(){

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {alpha:false, antialias:false, depth:false, stencil:false, preserveDrawingBuffer:true});
if(!gl){ document.getElementById('fallback').classList.add('show'); return; }
const floatExt = gl.getExtension('EXT_color_buffer_float');
if(!floatExt){ document.getElementById('fallback').classList.add('show'); return; }

/* ---------------- ayarlar ---------------- */
const SIM_RES = 196;
const DYE_RES = 800;
const PRESSURE_ITER = 24;
const config = {
  velDissipation: 0.5,   // hareket yavasca soner
  dyeDissipation: 0.02,  // murekkep neredeyse kalici
  pressure: 0.8,
  curl: 17,              // girdap / damar
  dropRadius: 0.0045,
  stirRadius: 0.0016,
  ringFreq: 205,         // esmerkezli halka sikligi
  inkAmount: 0.95,
  dropPush: 8.5,         // damla cevresini disari iter
  splatForce: 6300,
  inkDensity: 1.7,       // gorunur murekkep koyulugu
};

const PALETTE = [
  {name:'İndigo', c:[0.16,0.22,0.46]},
  {name:'Çini',   c:[0.16,0.46,0.55]},
  {name:'Sumi',   c:[0.12,0.11,0.10]},
  {name:'Gül',    c:[0.62,0.29,0.35]},
  {name:'Toprak', c:[0.64,0.41,0.26]},
  {name:'Çay',    c:[0.33,0.46,0.34]},
];
let current = PALETTE[0].c.slice();

/* ---------------- shader altyapisi ---------------- */
const VERT = `#version 300 es
precision highp float;
layout(location=0) in vec2 aPos;
out vec2 vUv; out vec2 vL; out vec2 vR; out vec2 vT; out vec2 vB;
uniform vec2 texelSize;
void main(){
  vUv = aPos*0.5+0.5;
  vL = vUv - vec2(texelSize.x, 0.0);
  vR = vUv + vec2(texelSize.x, 0.0);
  vT = vUv + vec2(0.0, texelSize.y);
  vB = vUv - vec2(0.0, texelSize.y);
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const HEAD = `#version 300 es
precision highp float;
precision highp sampler2D;
in vec2 vUv; in vec2 vL; in vec2 vR; in vec2 vT; in vec2 vB;
out vec4 fragColor;
`;

const F_CLEAR = HEAD + `
uniform sampler2D uTexture; uniform float value;
void main(){ fragColor = value * texture(uTexture, vUv); }`;

const F_SPLAT = HEAD + `
uniform sampler2D uTarget; uniform float aspectRatio; uniform vec3 color; uniform vec2 point; uniform float radius;
void main(){
  vec2 p = vUv - point; p.x *= aspectRatio;
  vec3 splat = exp(-dot(p,p)/radius) * color;
  fragColor = vec4(texture(uTarget, vUv).xyz + splat, 1.0);
}`;

const F_RING = HEAD + `
uniform sampler2D uTarget; uniform float aspectRatio; uniform vec3 color; uniform vec2 point; uniform float radius; uniform float freq;
void main(){
  vec2 p = vUv - point; p.x *= aspectRatio;
  float d = length(p);
  float env = exp(-dot(p,p)/radius);
  float band = 0.55 + 0.45*cos(d*freq);
  vec3 add = color * env * band;
  fragColor = vec4(texture(uTarget, vUv).xyz + add, 1.0);
}`;

const F_RADIAL = HEAD + `
uniform sampler2D uTarget; uniform float aspectRatio; uniform vec2 point; uniform float radius; uniform float strength;
void main(){
  vec2 p = vUv - point; p.x *= aspectRatio;
  float d = length(p) + 1e-4;
  vec2 dir = p/d;
  float env = exp(-dot(p,p)/radius);
  vec2 base = texture(uTarget, vUv).xy;
  fragColor = vec4(base + dir*strength*env, 0.0, 1.0);
}`;

const F_ADVECT = HEAD + `
uniform sampler2D uVelocity; uniform sampler2D uSource; uniform vec2 simTexel; uniform float dt; uniform float dissipation;
void main(){
  vec2 coord = vUv - dt * texture(uVelocity, vUv).xy * simTexel;
  vec4 result = texture(uSource, coord);
  fragColor = result/(1.0 + dissipation*dt);
}`;

const F_DIVERGENCE = HEAD + `
uniform sampler2D uVelocity;
void main(){
  float L = texture(uVelocity, vL).x;
  float R = texture(uVelocity, vR).x;
  float T = texture(uVelocity, vT).y;
  float B = texture(uVelocity, vB).y;
  float div = 0.5*(R-L+T-B);
  fragColor = vec4(div, 0.0, 0.0, 1.0);
}`;

const F_CURL = HEAD + `
uniform sampler2D uVelocity;
void main(){
  float L = texture(uVelocity, vL).y;
  float R = texture(uVelocity, vR).y;
  float T = texture(uVelocity, vT).x;
  float B = texture(uVelocity, vB).x;
  float curl = 0.5*((R-L)-(T-B));
  fragColor = vec4(curl, 0.0, 0.0, 1.0);
}`;

const F_VORTICITY = HEAD + `
uniform sampler2D uVelocity; uniform sampler2D uCurl; uniform float curlAmount; uniform float dt;
void main(){
  float L = texture(uCurl, vL).x;
  float R = texture(uCurl, vR).x;
  float T = texture(uCurl, vT).x;
  float B = texture(uCurl, vB).x;
  float C = texture(uCurl, vUv).x;
  vec2 force = 0.5*vec2(abs(T)-abs(B), abs(R)-abs(L));
  force /= length(force)+1e-4;
  force *= curlAmount * C;
  force.y *= -1.0;
  vec2 vel = texture(uVelocity, vUv).xy + force*dt;
  vel = clamp(vel, -1000.0, 1000.0);
  fragColor = vec4(vel, 0.0, 1.0);
}`;

const F_PRESSURE = HEAD + `
uniform sampler2D uPressure; uniform sampler2D uDivergence;
void main(){
  float L = texture(uPressure, vL).x;
  float R = texture(uPressure, vR).x;
  float T = texture(uPressure, vT).x;
  float B = texture(uPressure, vB).x;
  float div = texture(uDivergence, vUv).x;
  float p = (L+R+T+B-div)*0.25;
  fragColor = vec4(p, 0.0, 0.0, 1.0);
}`;

const F_GRADIENT = HEAD + `
uniform sampler2D uPressure; uniform sampler2D uVelocity;
void main(){
  float L = texture(uPressure, vL).x;
  float R = texture(uPressure, vR).x;
  float T = texture(uPressure, vT).x;
  float B = texture(uPressure, vB).x;
  vec2 vel = texture(uVelocity, vUv).xy;
  vel -= 0.5*vec2(R-L, T-B);
  fragColor = vec4(vel, 0.0, 1.0);
}`;

const F_DISPLAY = HEAD + `
uniform sampler2D uDye; uniform float density;
float hash(vec2 p){ p = fract(p*vec2(123.34,456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
void main(){
  vec3 absb = max(texture(uDye, vUv).rgb, 0.0);
  float grain = (hash(gl_FragCoord.xy)-0.5)*0.035;
  float mottle = 0.02*sin(vUv.x*9.0)*sin(vUv.y*11.0);
  vec3 paper = vec3(0.937,0.905,0.835) + grain + mottle;
  vec3 col = paper * exp(-absb*density);
  vec2 q = vUv-0.5;
  col *= 1.0 - dot(q,q)*0.45;
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('shader:', gl.getShaderInfoLog(s), src);
  return s;
}
function Program(fragSrc){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error('link:', gl.getProgramInfoLog(p));
  const u = {}; const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){ const info = gl.getActiveUniform(p,i); u[info.name] = gl.getUniformLocation(p, info.name); }
  return {program:p, u};
}

const prog = {
  clear:     Program(F_CLEAR),
  splat:     Program(F_SPLAT),
  ring:      Program(F_RING),
  radial:    Program(F_RADIAL),
  advect:    Program(F_ADVECT),
  divergence:Program(F_DIVERGENCE),
  curl:      Program(F_CURL),
  vorticity: Program(F_VORTICITY),
  pressure:  Program(F_PRESSURE),
  gradient:  Program(F_GRADIENT),
  display:   Program(F_DISPLAY),
};

/* fullscreen triangle */
const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
const vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

function blit(target){
  if(target){ gl.viewport(0,0,target.width,target.height); gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo); }
  else { gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight); gl.bindFramebuffer(gl.FRAMEBUFFER, null); }
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

/* ---------------- framebuffer'lar ---------------- */
function createFBO(w,h, internal, format, type, filter){
  gl.activeTexture(gl.TEXTURE0);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internal, w, h, 0, format, type, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.viewport(0,0,w,h); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  return {
    texture:tex, fbo, width:w, height:h, texelX:1/w, texelY:1/h,
    attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; }
  };
}
function createDouble(w,h, internal, format, type, filter){
  let a = createFBO(w,h,internal,format,type,filter);
  let b = createFBO(w,h,internal,format,type,filter);
  return {
    width:w, height:h, texelX:1/w, texelY:1/h,
    get read(){return a;}, get write(){return b;},
    swap(){ const t=a; a=b; b=t; }
  };
}

let dye, velocity, divergence, curl, pressure;
let simW, simH, dyeW, dyeH;

function getRes(res){
  let ar = gl.drawingBufferWidth/gl.drawingBufferHeight;
  if(ar < 1) ar = 1/ar;
  const min = Math.round(res), max = Math.round(res*ar);
  return gl.drawingBufferWidth > gl.drawingBufferHeight ? {w:max,h:min} : {w:min,h:max};
}

function initFBOs(){
  const s = getRes(SIM_RES), d = getRes(DYE_RES);
  simW=s.w; simH=s.h; dyeW=d.w; dyeH=d.h;
  const RGBA16F=gl.RGBA16F, RG16F=gl.RG16F, R16F=gl.R16F, HF=gl.HALF_FLOAT;
  const L=gl.LINEAR, N=gl.NEAREST;

  // mevcut boyayi koru (resize sirasinda)
  const oldDye = dye;
  dye = createDouble(dyeW, dyeH, RGBA16F, gl.RGBA, HF, L);
  if(oldDye){
    gl.useProgram(prog.clear.program);
    gl.uniform1i(prog.clear.u.uTexture, oldDye.read.attach(0));
    gl.uniform1f(prog.clear.u.value, 1.0);
    blit(dye.write); dye.swap();
  }
  velocity   = createDouble(simW, simH, RG16F, gl.RG, HF, L);
  divergence = createFBO(simW, simH, R16F, gl.RED, HF, N);
  curl       = createFBO(simW, simH, R16F, gl.RED, HF, N);
  pressure   = createDouble(simW, simH, R16F, gl.RED, HF, N);
}

/* ---------------- simulasyon ---------------- */
function step(dt){
  gl.disable(gl.BLEND);

  gl.useProgram(prog.curl.program);
  gl.uniform2f(prog.curl.u.texelSize, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.curl.u.uVelocity, velocity.read.attach(0));
  blit(curl);

  gl.useProgram(prog.vorticity.program);
  gl.uniform2f(prog.vorticity.u.texelSize, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.vorticity.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.vorticity.u.uCurl, curl.attach(1));
  gl.uniform1f(prog.vorticity.u.curlAmount, config.curl);
  gl.uniform1f(prog.vorticity.u.dt, dt);
  blit(velocity.write); velocity.swap();

  gl.useProgram(prog.divergence.program);
  gl.uniform2f(prog.divergence.u.texelSize, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.divergence.u.uVelocity, velocity.read.attach(0));
  blit(divergence);

  gl.useProgram(prog.clear.program);
  gl.uniform1i(prog.clear.u.uTexture, pressure.read.attach(0));
  gl.uniform1f(prog.clear.u.value, config.pressure);
  blit(pressure.write); pressure.swap();

  gl.useProgram(prog.pressure.program);
  gl.uniform2f(prog.pressure.u.texelSize, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.pressure.u.uDivergence, divergence.attach(0));
  for(let i=0;i<PRESSURE_ITER;i++){
    gl.uniform1i(prog.pressure.u.uPressure, pressure.read.attach(1));
    blit(pressure.write); pressure.swap();
  }

  gl.useProgram(prog.gradient.program);
  gl.uniform2f(prog.gradient.u.texelSize, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.gradient.u.uPressure, pressure.read.attach(0));
  gl.uniform1i(prog.gradient.u.uVelocity, velocity.read.attach(1));
  blit(velocity.write); velocity.swap();

  gl.useProgram(prog.advect.program);
  gl.uniform2f(prog.advect.u.simTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.advect.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.advect.u.uSource, velocity.read.attach(0));
  gl.uniform1f(prog.advect.u.dt, dt);
  gl.uniform1f(prog.advect.u.dissipation, config.velDissipation);
  blit(velocity.write); velocity.swap();

  gl.uniform1i(prog.advect.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.advect.u.uSource, dye.read.attach(1));
  gl.uniform1f(prog.advect.u.dissipation, config.dyeDissipation);
  blit(dye.write); dye.swap();
}

function render(){
  gl.useProgram(prog.display.program);
  gl.uniform1i(prog.display.u.uDye, dye.read.attach(0));
  gl.uniform1f(prog.display.u.density, config.inkDensity);
  blit(null);
}

/* ---------------- girdi (damla / karistirma) ---------------- */
function splatVelocity(x,y,dx,dy){
  gl.useProgram(prog.splat.program);
  gl.uniform1i(prog.splat.u.uTarget, velocity.read.attach(0));
  gl.uniform1f(prog.splat.u.aspectRatio, canvas.width/canvas.height);
  gl.uniform2f(prog.splat.u.point, x, y);
  gl.uniform3f(prog.splat.u.color, dx, dy, 0.0);
  gl.uniform1f(prog.splat.u.radius, config.stirRadius);
  blit(velocity.write); velocity.swap();
}
function drop(x,y,col){
  // esmerkezli halka boyasi (absorpsiyon = 1 - gorunur renk)
  gl.useProgram(prog.ring.program);
  gl.uniform1i(prog.ring.u.uTarget, dye.read.attach(0));
  gl.uniform1f(prog.ring.u.aspectRatio, canvas.width/canvas.height);
  gl.uniform2f(prog.ring.u.point, x, y);
  gl.uniform3f(prog.ring.u.color, (1-col[0])*config.inkAmount, (1-col[1])*config.inkAmount, (1-col[2])*config.inkAmount);
  gl.uniform1f(prog.ring.u.radius, config.dropRadius);
  gl.uniform1f(prog.ring.u.freq, config.ringFreq);
  blit(dye.write); dye.swap();

  // disari dogru itme (onceki halkalari acar)
  gl.useProgram(prog.radial.program);
  gl.uniform1i(prog.radial.u.uTarget, velocity.read.attach(0));
  gl.uniform1f(prog.radial.u.aspectRatio, canvas.width/canvas.height);
  gl.uniform2f(prog.radial.u.point, x, y);
  gl.uniform1f(prog.radial.u.radius, config.dropRadius*2.2);
  gl.uniform1f(prog.radial.u.strength, config.dropPush);
  blit(velocity.write); velocity.swap();
}
function clearAll(){
  for(const f of [dye, velocity, pressure]){
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.read.fbo); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.write.fbo); gl.clear(gl.COLOR_BUFFER_BIT);
  }
}

/* ---------------- ana dongu ---------------- */
let lastT = 0;
function frame(t){
  const dt = Math.min((t-lastT)/1000 || 0.016, 0.02);
  lastT = t;
  step(dt);
  render();
  requestAnimationFrame(frame);
}

/* ---------------- pointer ---------------- */
const pointer = {down:false, moved:false, lx:0, ly:0, sx:0, sy:0};
function uvOf(e){
  const r = canvas.getBoundingClientRect();
  return [ (e.clientX-r.left)/r.width, 1 - (e.clientY-r.top)/r.height ];
}
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  const [u,v] = uvOf(e);
  pointer.down=true; pointer.moved=false; pointer.lx=u; pointer.ly=v; pointer.sx=u; pointer.sy=v;
  hideHint();
});
canvas.addEventListener('pointermove', e=>{
  if(!pointer.down) return;
  const [u,v] = uvOf(e);
  const dx = u-pointer.lx, dy = v-pointer.ly;
  if(Math.hypot(u-pointer.sx, v-pointer.sy) > 0.008) pointer.moved = true;
  if(pointer.moved) splatVelocity(u, v, dx*config.splatForce, dy*config.splatForce);
  pointer.lx=u; pointer.ly=v;
});
function endPointer(e){
  if(!pointer.down) return;
  pointer.down=false;
  if(!pointer.moved){
    const [u,v] = uvOf(e);
    drop(u, v, current);
    if(audioOn) playBell();
  }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', ()=>{ pointer.down=false; });

/* ---------------- arayuz ---------------- */
let hinted=false;
function hideHint(){ if(hinted) return; hinted=true; document.getElementById('hint').classList.add('gone'); }

const pal = document.getElementById('palette');
PALETTE.forEach((p,i)=>{
  const b = document.createElement('button');

/* ---------------- ortam sesi (varsayilan kapali) ---------------- */
let audioOn=false, AC=null, master=null;
const pentatonic=[294.66,330,392,440,523.25,587.33];
function initAudio(){
  const Ctx = window.AudioContext || window.webkitAudioContext;
  AC = new Ctx();
  master = AC.createGain(); master.gain.value = 0.0; master.connect(AC.destination);

  // yumusak pad
  const padGain = AC.createGain(); padGain.gain.value = 0.05;
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520;
  padGain.connect(lp); lp.connect(master);
  [110, 110*1.5, 110*2.01].forEach((f,i)=>{
    const o = AC.createOscillator(); o.type = i===0?'sine':'triangle'; o.frequency.value=f;
    const g = AC.createGain(); g.gain.value = i===0?0.6:0.25;
    o.connect(g); g.connect(padGain); o.start();
  });
  // su tinisi (filtreli kahverengi gurultu)
  const dur = 2.0, buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate), ch = buf.getChannelData(0);
  let last=0;
  for(let i=0;i<ch.length;i++){ const w=(Math.random()*2-1)*0.5; last=(last+0.02*w)/1.02; ch[i]=last*3.2; }
  const noise = AC.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const nf = AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=420;
  const ng = AC.createGain(); ng.gain.value=0.04;
  noise.connect(nf); nf.connect(ng); ng.connect(master); noise.start();
}
function playBell(){
  if(!AC) return;
  const f = pentatonic[(Math.random()*pentatonic.length)|0];
  const o = AC.createOscillator(); o.type='sine'; o.frequency.value=f;
  const o2 = AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*2.005;
  const g = AC.createGain(); const t = AC.currentTime;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+1.8);
  const g2 = AC.createGain(); g2.gain.value=0.3;
  o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
  o.start(t); o2.start(t); o.stop(t+1.9); o2.stop(t+1.9);
}
document.getElementById('soundBtn').addEventListener('click', function(){
  if(!AC) initAudio();
  AC.resume();
  audioOn = !audioOn;
  this.classList.toggle('on', audioOn);
  master.gain.linearRampToValueAtTime(audioOn?0.55:0.0, AC.currentTime+0.6);
});

function viewSize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  let w = window.innerWidth || document.documentElement.clientWidth || 0;
  let h = window.innerHeight || document.documentElement.clientHeight || 0;
  if(w < 2 || h < 2){ w = 1280; h = 800; }   // viewport 0 donerse guvenli varsayilan
  return [Math.max(2, Math.floor(w*dpr)), Math.max(2, Math.floor(h*dpr))];
}
function resize(){
  const [w,h] = viewSize();
  if(canvas.width!==w || canvas.height!==h){
    canvas.width=w; canvas.height=h;
    initFBOs();
  }
}
let resizeT;
window.addEventListener('resize', ()=>{ clearTimeout(resizeT); resizeT=setTimeout(resize,180); });
window.addEventListener('load', resize);
