<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ebru · Su Üstünde Mürekkep</title>
<meta name="description" content="Tarayıcıda gerçek akışkan simülasyonuyla ebru / su üstünde mürekkep sanatı.">
<style>
  :root{
    --ink:#33302a; --muted:#8a7f6c; --panel:rgba(248,244,235,.86);
    --line:rgba(70,60,46,.16); --accent:#7a6a4c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#ece6da;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Palatino Linotype","Book Antiqua",Georgia,serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}

  .brand{position:fixed;top:20px;left:24px;pointer-events:none;color:rgba(50,42,32,.7)}
  .brand b{font-size:22px;letter-spacing:.12em;display:block}
  .brand span{font-size:11px;letter-spacing:.34em;color:rgba(90,78,58,.65);text-transform:lowercase}

  .hint{position:fixed;top:50%;left:0;right:0;text-align:center;transform:translateY(-50%);
    color:rgba(70,60,46,.42);font-size:clamp(14px,2.3vw,18px);letter-spacing:.1em;
    pointer-events:none;transition:opacity 1s ease;padding:0 24px}
  .hint.gone{opacity:0}

  .bar{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    display:flex;align-items:center;gap:13px;
    background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:44px;padding:9px 15px;
    box-shadow:0 12px 38px rgba(40,32,18,.16)}
  .palette{display:flex;gap:9px}
  .dot{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.6);
    cursor:pointer;padding:0;transition:transform .15s, box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.22)}
  .dot:hover{transform:translateY(-2px)}
  .dot.active{border-color:#fff;box-shadow:0 0 0 2px var(--ink),0 2px 6px rgba(0,0,0,.25)}
  .sep{width:1px;height:26px;background:var(--line)}
  .bar button.icon{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:rgba(255,255,255,.4);color:var(--ink);font-size:16px;cursor:pointer;
    display:grid;place-items:center;transition:.15s;line-height:1;font-family:system-ui,sans-serif}
  .bar button.icon:hover{background:#fff;border-color:rgba(70,60,46,.36)}
  .bar button.icon.on{background:var(--ink);color:#f5efe2}

  .fallback{position:fixed;inset:0;display:none;place-items:center;text-align:center;
    color:#5a4d3a;padding:30px;font-size:16px;line-height:1.7}
  .fallback.show{display:grid}

  .tray{position:fixed;inset:0;pointer-events:none;z-index:5;
    border:16px solid #4a3420;
    border-image:linear-gradient(135deg,#6e5132,#3a2814 40%,#5a4126 70%,#2c1d0f) 1;
    box-shadow:inset 0 0 0 2px rgba(201,169,106,.4), inset 0 0 46px rgba(0,0,0,.4)}
  .brand{z-index:10}
  .bar{flex-wrap:wrap;max-width:96vw;justify-content:center;z-index:10}
  .mode{padding:0 14px;height:38px;border-radius:19px;border:1px solid var(--line);
    background:rgba(255,255,255,.42);color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer;letter-spacing:.02em}
  .mode:hover{background:#fff;border-color:rgba(70,60,46,.36)}
  .presets{position:fixed;left:50%;bottom:82px;transform:translateX(-50%) translateY(8px);
    display:none;gap:8px;z-index:11;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:8px;box-shadow:0 12px 34px rgba(40,32,18,.18)}
  .presets.show{display:flex}
  .presets button{padding:8px 13px;border-radius:9px;border:1px solid var(--line);
    background:rgba(255,255,255,.55);color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer}
  .presets button:hover{background:#fff}
  .presets{bottom:124px}

  .dock{position:fixed;left:0;right:0;bottom:16px;z-index:10;display:flex;flex-wrap:wrap;
    gap:10px;justify-content:center;align-items:flex-end;padding:0 10px}
  .grp{display:flex;flex-direction:column;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:7px 11px 9px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 10px 30px rgba(40,32,18,.16)}
  .lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(90,78,58,.62)}
  .seg{display:flex;gap:5px;align-items:center}
  .t{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    min-width:52px;height:46px;padding:5px 8px;border:1px solid var(--line);border-radius:11px;
    background:rgba(255,255,255,.45);color:var(--ink);font-family:inherit;font-size:10px;letter-spacing:.01em;cursor:pointer;transition:.13s}
  .t svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .t:hover{background:#fff;border-color:rgba(70,60,46,.34);transform:translateY(-1px)}
  .t.active{background:var(--ink);color:var(--paper);border-color:var(--ink);box-shadow:0 4px 12px rgba(40,30,18,.3)}
  .dock .palette{display:flex;gap:8px;align-items:center;height:46px}
  .dock .dot{width:27px;height:27px}
  @media (max-width:560px){ .t{min-width:46px;height:42px;font-size:9px} .dock .dot{width:24px;height:24px} }

  /* kompakt tek satir bar */
  .bar3{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:5px;max-width:94vw;flex-wrap:wrap;justify-content:center;
    background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:6px 9px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 10px 30px rgba(40,32,18,.18)}
  .bar3 .seg{display:flex;gap:3px}
  .b{width:38px;height:38px;display:grid;place-items:center;border:1px solid transparent;border-radius:50%;
    background:transparent;color:var(--ink);cursor:pointer;transition:.13s;padding:0}
  .b svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .b:hover{background:rgba(255,255,255,.65)}
  .b.active{background:var(--ink);color:var(--paper)}
  .b.ink{background:var(--ink);color:var(--paper)}
  .b.ink:hover{filter:brightness(1.18)}
  .vsep{width:1px;height:24px;background:var(--line);margin:0 3px}
  .bar3 .palette{display:flex;gap:6px;align-items:center}
  .bar3 .dot{width:24px;height:24px}

  /* daha menusu */
  .menu{position:fixed;left:50%;bottom:72px;transform:translateX(-50%);z-index:11;display:none;
    flex-direction:column;gap:11px;min-width:264px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 16px 40px rgba(40,32,18,.22)}
  .menu.show{display:flex}
  .mrow{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .mlbl{font-size:12.5px;color:var(--ink);letter-spacing:.02em}
  .chips{display:flex;gap:5px}
  .chip{padding:5px 9px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.5);
    color:var(--ink);font-family:inherit;font-size:11.5px;cursor:pointer;transition:.12s}
  .chip:hover{background:#fff}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .tgl{padding:5px 13px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.5);
    color:var(--ink);font-family:inherit;font-size:11.5px;cursor:pointer;min-width:62px}
  .tgl.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* kagida bas (peel) */
  .press{position:fixed;inset:0;z-index:30;display:none;place-items:center;
    background:rgba(28,22,14,0);transition:background .5s;perspective:1500px}
  .press.show{display:grid;background:rgba(28,22,14,.58)}
  .sheet{position:relative;width:min(86vw,940px);max-height:76vh;aspect-ratio:3/2;
    background-size:cover;background-position:center;border:8px solid #f5efe0;border-radius:3px;
    box-shadow:0 34px 80px rgba(0,0,0,.55);transform-origin:50% 100%;filter:saturate(.94) contrast(.97)}
  .sheet::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(130% 130% at 50% 0%, rgba(255,255,255,.14), rgba(120,100,70,.12));mix-blend-mode:overlay}
  .sheet.go{animation:peel 1.5s cubic-bezier(.55,.05,.2,1)}
  @keyframes peel{
    0%{transform:translateY(2%) rotateX(0deg) scale(1.01)}
    32%{transform:translateY(-7%) rotateX(46deg) scale(.985)}
    60%{transform:translateY(-2%) rotateX(12deg) scale(1)}
    100%{transform:translateY(0) rotateX(0deg) scale(1)}
  }
  .pacts{position:fixed;bottom:5.5vh;left:50%;transform:translateX(-50%);z-index:31;display:none;gap:10px}
  .pacts.show{display:flex}
  .pacts button{padding:10px 22px;border-radius:24px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer;
    backdrop-filter:blur(8px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .pacts button#printSave{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="tray"></div>
  <div class="brand"><b>EBRU</b><span>su üstünde mürekkep</span></div>
  <div class="hint" id="hint">Damla ile renk bırak　·　Biz / Tarak ile boyayı yay</div>

  <div class="bar3">
    <div class="seg" id="tools">
      <button class="b active" data-tool="drop" title="Damla: yüzeye renk bırakır"><svg viewBox="0 0 24 24"><path d="M12 3c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11z"/></svg></button>
      <button class="b" data-tool="biz" title="Biz: boya eklemeden var olan boyayı yayar"><svg viewBox="0 0 24 24"><path d="M4 20L17 7"/><path d="M14 4l6 6"/></svg></button>
      <button class="b" data-tool="comb" title="Tarak: boyasız, tarayarak çizgi açar"><svg viewBox="0 0 24 24"><path d="M3 8h18"/><path d="M6 8v9M10 8v9M14 8v9M18 8v9"/></svg></button>
      <button class="b" data-tool="flower" title="Çiçek: simetrik çiçek"><svg viewBox="0 0 24 24"><circle cx="12" cy="6.4" r="2.3"/><circle cx="12" cy="17.6" r="2.3"/><circle cx="6.4" cy="12" r="2.3"/><circle cx="17.6" cy="12" r="2.3"/><circle cx="12" cy="12" r="2"/></svg></button>
    </div>
    <span class="vsep"></span>
    <div class="palette" id="palette"></div>
    <span class="vsep"></span>
    <button class="b" id="clearBtn" title="Temizle"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>
    <button class="b" id="saveBtn" title="PNG indir"><svg viewBox="0 0 24 24"><path d="M12 4v10m0 0l-4-4m4 4l4-4M5 20h14"/></svg></button>
    <button class="b ink" id="pressBtn" title="Kağıda bas: deseni kağıda aktar"><svg viewBox="0 0 24 24"><path d="M7 3h8l4 4v14H5V3z"/><path d="M15 3v4h4M8 13h8M8 17h6"/></svg></button>
    <button class="b" id="moreBtn" title="Ayarlar: simetri, otomatik, desen, ses"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg></button>
  </div>

  <div class="menu" id="moreMenu">
    <div class="mrow"><span class="mlbl">Simetri</span>
      <div class="chips" id="symChips">
        <button class="chip on" data-s="1">Kapalı</button><button class="chip" data-s="2">2</button><button class="chip" data-s="4">4</button><button class="chip" data-s="6">6</button><button class="chip" data-s="8">8</button>
      </div>
    </div>
    <div class="mrow"><span class="mlbl">Otomatik akış</span><button class="tgl" id="autoTgl">Kapalı</button></div>
    <div class="mrow"><span class="mlbl">Hazır desen</span>
      <div class="chips">
        <button class="chip" data-p="gelgit">Gel-git</button><button class="chip" data-p="sal">Şal</button><button class="chip" data-p="bulbul">Bülbül</button>
      </div>
    </div>
    <div class="mrow"><span class="mlbl">Ortam sesi</span><button class="tgl" id="soundTgl">Kapalı</button></div>
  </div>

  <div class="press" id="press">
    <div class="sheet" id="sheet"></div>
  </div>
  <div class="pacts" id="printActions">
    <button id="printSave">İndir</button>
    <button id="printClose">Kapat</button>
  </div>

  <div class="fallback" id="fallback">
    Bu efekt için tarayıcınızda <b>WebGL2 + float buffer</b> desteği gerekiyor.<br>
    Güncel bir Chrome, Edge, Firefox veya Safari ile tekrar deneyin.
  </div>

<script>
"use strict";
(function(){

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {alpha:false, antialias:false, depth:false, stencil:false, preserveDrawingBuffer:true});
if(!gl){ document.getElementById('fallback').classList.add('show'); return; }
if(!gl.getExtension('EXT_color_buffer_float')){ document.getElementById('fallback').classList.add('show'); return; }

/* ---------------- ayarlar ---------------- */
const SIM_RES = 256;
const DYE_RES = 1024;
const PRESSURE_ITER = 28;
const config = {
  VEL_DISSIPATION: 0.82,   // daha kivamli/agir su; jest bitince cabuk durulur
  DYE_DISSIPATION: 0.003,  // murekkep neredeyse kalici
  CURL: 15,                // girdap / damar
  SPLAT_RADIUS: 0.0022,
  SPLAT_FORCE: 6200,
  DYE_FLOW: 1.0,           // dye akis hizi (1 = hiz alaniyla ayni)
  DROP_STR: 0.62,          // murekkep koyulugu (yumusak damla)
  DROP_PUSH: 1.0,          // damlanin disari itmesi
  DROP_DENSITY: 1.45,      // ebru damlasinin (net daire) koyulugu
};

function hexRGB(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }
const INKS = [
  {name:'Lacivert', c:hexRGB('#15336e')},
  {name:'Çini mavi',c:hexRGB('#1f7a8c')},
  {name:'Kırmızı',  c:hexRGB('#cc2f24')},
  {name:'Sarı',     c:hexRGB('#e0a51e')},
  {name:'Yeşil',    c:hexRGB('#1f7a52')},
  {name:'Mor',      c:hexRGB('#6b3fa0')},
  {name:'Siyah',    c:hexRGB('#1a1a20')},
  {name:'Altın',    c:hexRGB('#c9a227')},
];
let current = INKS[0].c;
let autoIdx = 0;
let symmetry = 1;   // 1=yok, 2/4/6/8 = ayna/cicek simetrisi
let tool = 'drop';  // drop | biz | comb | flower
let scriptFn = null, scriptMs = 0;

// gorunur renk -> sogurma vektoru (paper * exp(-A) o renge yaklasir)
function inkAbsorption(c, strength){
  const e = 0.012;
  return [ -Math.log(Math.max(c[0],e))*strength,
           -Math.log(Math.max(c[1],e))*strength,
           -Math.log(Math.max(c[2],e))*strength ];
}

/* ---------------- shader ---------------- */
const VERT = `#version 300 es
precision highp float;
layout(location=0) in vec2 aPos;
out vec2 vUv;
void main(){ vUv = aPos*0.5+0.5; gl_Position = vec4(aPos,0.0,1.0); }`;

const HEAD = `#version 300 es
precision highp float; precision highp sampler2D;
in vec2 vUv; out vec4 fragColor;
uniform vec2 uTexel;
`;

const F_CLEAR = HEAD + `
uniform sampler2D uTexture; uniform float value;
void main(){ fragColor = value * texture(uTexture, vUv); }`;

const F_SPLAT = HEAD + `
uniform sampler2D uTarget; uniform float uAspect; uniform vec3 uColor; uniform vec2 uPoint; uniform float uRadius;
void main(){
  vec2 p = vUv - uPoint; p.x *= uAspect;
  vec3 splat = exp(-dot(p,p)/uRadius) * uColor;
  fragColor = vec4(texture(uTarget, vUv).rgb + splat, 1.0);
}`;

const F_ADVECT = HEAD + `
uniform sampler2D uVelocity; uniform sampler2D uSource; uniform float dt; uniform float dissipation;
void main(){
  vec2 coord = vUv - dt * texture(uVelocity, vUv).xy * uTexel;
  fragColor = texture(uSource, coord) / (1.0 + dissipation*dt);
}`;

// gercek ebru damlasi: net daire + mevcut boyayi disari iten esmerkezli yer degistirme
const F_MARBLE = HEAD + `
uniform sampler2D uDye; uniform float uAspect; uniform vec2 uPoint; uniform float uRadius; uniform vec3 uInk;
void main(){
  vec2 p = vUv - uPoint; p.x *= uAspect;
  float d = length(p);
  float dd = max(d*d - uRadius*uRadius, 0.0);
  float src = sqrt(dd) / max(d, 1e-5);          // P_old = C + (P-C)*sqrt(1 - r^2/d^2)
  vec2 sp = p*src; sp.x /= uAspect;
  vec3 displaced = texture(uDye, uPoint+sp).rgb;
  float disk = 1.0 - smoothstep(uRadius-0.0018, uRadius+0.0018, d);
  fragColor = vec4(mix(displaced, uInk, disk), 1.0);  // ic = net renk (kapatir), dis = itilen boya
}`;

const F_CURL = HEAD + `
uniform sampler2D uVelocity;
void main(){
  float L = texture(uVelocity, vUv - vec2(uTexel.x,0.0)).y;
  float R = texture(uVelocity, vUv + vec2(uTexel.x,0.0)).y;
  float B = texture(uVelocity, vUv - vec2(0.0,uTexel.y)).x;
  float T = texture(uVelocity, vUv + vec2(0.0,uTexel.y)).x;
  fragColor = vec4(0.5*(R-L-T+B), 0.0, 0.0, 1.0);
}`;

const F_VORTICITY = HEAD + `
uniform sampler2D uVelocity; uniform sampler2D uCurl; uniform float uCurlStrength; uniform float dt;
void main(){
  float L = texture(uCurl, vUv - vec2(uTexel.x,0.0)).x;
  float R = texture(uCurl, vUv + vec2(uTexel.x,0.0)).x;
  float B = texture(uCurl, vUv - vec2(0.0,uTexel.y)).x;
  float T = texture(uCurl, vUv + vec2(0.0,uTexel.y)).x;
  float C = texture(uCurl, vUv).x;
  vec2 force = 0.5*vec2(abs(T)-abs(B), abs(R)-abs(L));
  force /= length(force)+0.0001;
  force *= uCurlStrength * C;
  force.y *= -1.0;
  vec2 vel = texture(uVelocity, vUv).xy + force*dt;
  fragColor = vec4(clamp(vel,-1000.0,1000.0), 0.0, 1.0);
}`;

const F_DIVERGENCE = HEAD + `
uniform sampler2D uVelocity;
void main(){
  float L = texture(uVelocity, vUv - vec2(uTexel.x,0.0)).x;
  float R = texture(uVelocity, vUv + vec2(uTexel.x,0.0)).x;
  float B = texture(uVelocity, vUv - vec2(0.0,uTexel.y)).y;
  float T = texture(uVelocity, vUv + vec2(0.0,uTexel.y)).y;
  vec2 C = texture(uVelocity, vUv).xy;
  if(vUv.x-uTexel.x < 0.0) L = -C.x;
  if(vUv.x+uTexel.x > 1.0) R = -C.x;
  if(vUv.y-uTexel.y < 0.0) B = -C.y;
  if(vUv.y+uTexel.y > 1.0) T = -C.y;
  fragColor = vec4(0.5*(R-L+T-B), 0.0, 0.0, 1.0);
}`;

const F_PRESSURE = HEAD + `
uniform sampler2D uPressure; uniform sampler2D uDivergence;
void main(){
  float L = texture(uPressure, vUv - vec2(uTexel.x,0.0)).x;
  float R = texture(uPressure, vUv + vec2(uTexel.x,0.0)).x;
  float B = texture(uPressure, vUv - vec2(0.0,uTexel.y)).x;
  float T = texture(uPressure, vUv + vec2(0.0,uTexel.y)).x;
  float div = texture(uDivergence, vUv).x;
  fragColor = vec4((L+R+B+T-div)*0.25, 0.0, 0.0, 1.0);
}`;

const F_GRADIENT = HEAD + `
uniform sampler2D uPressure; uniform sampler2D uVelocity;
void main(){
  float L = texture(uPressure, vUv - vec2(uTexel.x,0.0)).x;
  float R = texture(uPressure, vUv + vec2(uTexel.x,0.0)).x;
  float B = texture(uPressure, vUv - vec2(0.0,uTexel.y)).x;
  float T = texture(uPressure, vUv + vec2(0.0,uTexel.y)).x;
  vec2 vel = texture(uVelocity, vUv).xy - vec2(R-L, T-B);
  fragColor = vec4(vel, 0.0, 1.0);
}`;

const F_DISPLAY = HEAD + `
uniform sampler2D uDye; uniform float uSym; uniform float uAspect;
const vec3 uPaper = vec3(0.937,0.918,0.878);
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x), mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);
}
vec2 foldUV(vec2 uv){
  if(uSym < 1.5) return uv;
  vec2 p = uv - 0.5; p.x *= uAspect;
  float r = length(p);
  float a = atan(p.y, p.x);
  float seg = 6.28318530718 / uSym;
  a = mod(a, seg);
  a = min(a, seg - a);            // ayna -> kaleidoskop (cicek/hatip simetrisi)
  p = vec2(cos(a), sin(a)) * r;
  p.x /= uAspect;
  return p + 0.5;
}
void main(){
  vec2 duv = foldUV(vUv);
  float fiber = noise(vUv*420.0)*0.028 + noise(vUv*180.0)*0.022 + noise(vUv*60.0)*0.018;
  vec3 A = max(texture(uDye, duv).rgb, 0.0);
  vec3 col = uPaper * exp(-A) + fiber;
  vec2 uv2 = vUv*(1.0-vUv.yx);
  float vign = pow(uv2.x*uv2.y*15.0, 0.18);
  col *= 0.92 + 0.08*vign;
  fragColor = vec4(clamp(col,0.0,1.0), 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('shader:', gl.getShaderInfoLog(s), src);
  return s;
}
function Program(frag){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error('link:', gl.getProgramInfoLog(p));
  const u={}; const n=gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){ const info=gl.getActiveUniform(p,i); u[info.name]=gl.getUniformLocation(p,info.name); }
  return {program:p, u};
}
const prog = {
  clear:Program(F_CLEAR), splat:Program(F_SPLAT), advect:Program(F_ADVECT), marble:Program(F_MARBLE),
  curl:Program(F_CURL), vorticity:Program(F_VORTICITY), divergence:Program(F_DIVERGENCE),
  pressure:Program(F_PRESSURE), gradient:Program(F_GRADIENT), display:Program(F_DISPLAY),
};

const vao=gl.createVertexArray(); gl.bindVertexArray(vao);
const vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

function blit(target){
  if(target){ gl.viewport(0,0,target.width,target.height); gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo); }
  else { gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight); gl.bindFramebuffer(gl.FRAMEBUFFER, null); }
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

function createFBO(w,h, internal, format, type, filter){
  gl.activeTexture(gl.TEXTURE0);
  const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internal, w, h, 0, format, type, null);
  const fbo=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.viewport(0,0,w,h); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  return { texture:tex, fbo, width:w, height:h, texelX:1/w, texelY:1/h,
    attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; } };
}
function createDouble(w,h, internal, format, type, filter){
  let a=createFBO(w,h,internal,format,type,filter), b=createFBO(w,h,internal,format,type,filter);
  return { width:w, height:h, texelX:1/w, texelY:1/h,
    get read(){return a;}, get write(){return b;}, swap(){ const t=a;a=b;b=t; } };
}

let dye, velocity, divergence, curl, pressure, simW, simH, dyeW, dyeH;
function getRes(res){
  let ar=gl.drawingBufferWidth/gl.drawingBufferHeight; if(ar<1) ar=1/ar;
  const min=Math.round(res), max=Math.round(res*ar);
  return gl.drawingBufferWidth>gl.drawingBufferHeight ? {w:max,h:min} : {w:min,h:max};
}
function initFBOs(){
  const s=getRes(SIM_RES), d=getRes(DYE_RES);
  simW=s.w; simH=s.h; dyeW=d.w; dyeH=d.h;
  const HF=gl.HALF_FLOAT, L=gl.LINEAR, N=gl.NEAREST;
  const oldDye=dye;
  dye = createDouble(dyeW, dyeH, gl.RGBA16F, gl.RGBA, HF, L);
  if(oldDye){
    gl.useProgram(prog.clear.program);
    gl.uniform1i(prog.clear.u.uTexture, oldDye.read.attach(0));
    gl.uniform1f(prog.clear.u.value, 1.0);
    blit(dye.write); dye.swap();
  }
  velocity   = createDouble(simW, simH, gl.RG16F, gl.RG, HF, L);
  divergence = createFBO(simW, simH, gl.R16F, gl.RED, HF, N);
  curl       = createFBO(simW, simH, gl.R16F, gl.RED, HF, N);
  pressure   = createDouble(simW, simH, gl.R16F, gl.RED, HF, N);
}

/* ---------------- simulasyon ---------------- */
function step(dt){
  gl.disable(gl.BLEND);

  gl.useProgram(prog.curl.program);
  gl.uniform2f(prog.curl.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.curl.u.uVelocity, velocity.read.attach(0));
  blit(curl);

  gl.useProgram(prog.vorticity.program);
  gl.uniform2f(prog.vorticity.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.vorticity.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.vorticity.u.uCurl, curl.attach(1));
  gl.uniform1f(prog.vorticity.u.uCurlStrength, config.CURL);
  gl.uniform1f(prog.vorticity.u.dt, dt);
  blit(velocity.write); velocity.swap();

  gl.useProgram(prog.divergence.program);
  gl.uniform2f(prog.divergence.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.divergence.u.uVelocity, velocity.read.attach(0));
  blit(divergence);

  gl.useProgram(prog.clear.program);
  gl.uniform1i(prog.clear.u.uTexture, pressure.read.attach(0));
  gl.uniform1f(prog.clear.u.value, 0.8);
  blit(pressure.write); pressure.swap();

  gl.useProgram(prog.pressure.program);
  gl.uniform2f(prog.pressure.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.pressure.u.uDivergence, divergence.attach(0));
  for(let i=0;i<PRESSURE_ITER;i++){
    gl.uniform1i(prog.pressure.u.uPressure, pressure.read.attach(1));
    blit(pressure.write); pressure.swap();
  }

  gl.useProgram(prog.gradient.program);
  gl.uniform2f(prog.gradient.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.gradient.u.uPressure, pressure.read.attach(0));
  gl.uniform1i(prog.gradient.u.uVelocity, velocity.read.attach(1));
  blit(velocity.write); velocity.swap();

  gl.useProgram(prog.advect.program);
  gl.uniform2f(prog.advect.u.uTexel, velocity.texelX, velocity.texelY);
  gl.uniform1i(prog.advect.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.advect.u.uSource, velocity.read.attach(0));
  gl.uniform1f(prog.advect.u.dt, dt);
  gl.uniform1f(prog.advect.u.dissipation, config.VEL_DISSIPATION);
  blit(velocity.write); velocity.swap();

  gl.uniform2f(prog.advect.u.uTexel, velocity.texelX*config.DYE_FLOW, velocity.texelY*config.DYE_FLOW);
  gl.uniform1i(prog.advect.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(prog.advect.u.uSource, dye.read.attach(1));
  gl.uniform1f(prog.advect.u.dissipation, config.DYE_DISSIPATION);
  blit(dye.write); dye.swap();
}
function render(){
  gl.useProgram(prog.display.program);
  gl.uniform1i(prog.display.u.uDye, dye.read.attach(0));
  gl.uniform1f(prog.display.u.uSym, symmetry);
  gl.uniform1f(prog.display.u.uAspect, canvas.width/canvas.height);
  blit(null);
}

/* ---------------- girdi ---------------- */
function splatVelocity(x,y,fx,fy,radMul){
  gl.useProgram(prog.splat.program);
  gl.uniform1i(prog.splat.u.uTarget, velocity.read.attach(0));
  gl.uniform1f(prog.splat.u.uAspect, canvas.width/canvas.height);
  gl.uniform2f(prog.splat.u.uPoint, x, y);
  gl.uniform3f(prog.splat.u.uColor, fx, fy, 0.0);
  gl.uniform1f(prog.splat.u.uRadius, config.SPLAT_RADIUS*(radMul||1));
  blit(velocity.write); velocity.swap();
}
function splatDye(x,y,A,radMul){
  gl.useProgram(prog.splat.program);
  gl.uniform1i(prog.splat.u.uTarget, dye.read.attach(0));
  gl.uniform1f(prog.splat.u.uAspect, canvas.width/canvas.height);
  gl.uniform2f(prog.splat.u.uPoint, x, y);
  gl.uniform3f(prog.splat.u.uColor, A[0], A[1], A[2]);
  gl.uniform1f(prog.splat.u.uRadius, config.SPLAT_RADIUS*(radMul||1));
  blit(dye.write); dye.swap();
}
function dropInk(x,y,c,strength){
  splatDye(x, y, inkAbsorption(c, strength*config.DROP_STR), 1.0);
  const ang=Math.random()*6.283, sp=(60+Math.random()*80)*config.DROP_PUSH;
  splatVelocity(x, y, Math.cos(ang)*sp, Math.sin(ang)*sp, 1.2);
}
// gercek ebru damlasi: net daire + esmerkezli itme (hiz EKLEMEZ, yerinde durur)
function dropMarble(x,y,c,radius){
  const A=inkAbsorption(c, config.DROP_DENSITY);
  gl.useProgram(prog.marble.program);
  gl.uniform1i(prog.marble.u.uDye, dye.read.attach(0));
  gl.uniform1f(prog.marble.u.uAspect, canvas.width/canvas.height);
  gl.uniform2f(prog.marble.u.uPoint, x, y);
  gl.uniform1f(prog.marble.u.uRadius, radius);
  gl.uniform3f(prog.marble.u.uInk, A[0], A[1], A[2]);
  blit(dye.write); dye.swap();
}
function clearAll(){
  for(const f of [dye, velocity, pressure]){
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.read.fbo); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.write.fbo); gl.clear(gl.COLOR_BUFFER_BIT);
  }
}

/* ---------------- tarak ve cicek araclari ---------------- */
function combStroke(x,y,px,py){
  const dx=x-px, dy=y-py, len=Math.hypot(dx,dy); if(len<1e-4) return;
  const asp=canvas.width/canvas.height;
  const ax=-dy/len, ay=dx/len;                 // tarak ekseni (harekete dik)
  const fx=dx*config.SPLAT_FORCE, fy=dy*config.SPLAT_FORCE;
  const teeth=22, span=0.92;
  for(let i=0;i<=teeth;i++){ const t=(i/teeth-0.5)*span; splatVelocity(x+ax*t/asp, y+ay*t, fx, fy, 0.5); }
}
function combAt(cx,cy, ax,ay, fx,fy){
  const teeth=28, span=1.0;
  for(let i=0;i<=teeth;i++){ const t=(i/teeth-0.5)*span; splatVelocity(cx+ax*t, cy+ay*t, fx, fy, 0.5); }
}
function makeFlower(x,y,color){
  splatDye(x, y, inkAbsorption(color, 1.1), 3.6);                                      // buyuk taban
  splatDye(x, y, inkAbsorption(INKS[(Math.random()*INKS.length)|0].c, 1.4), 1.1);      // kontrast merkez
  const N=6;
  for(let i=0;i<N;i++){
    const a=i*2*Math.PI/N, ox=Math.cos(a), oy=Math.sin(a);
    for(let j=1;j<=4;j++){ const rr=0.018*j; splatVelocity(x+ox*rr, y+oy*rr, ox*185, oy*185, 0.7); }
  }
  lastInteraction=performance.now();
}
function battalGround(){
  for(let i=0;i<46;i++){ const x=0.06+Math.random()*0.88, y=0.08+Math.random()*0.84; dropMarble(x,y, INKS[(Math.random()*INKS.length)|0].c, 0.018+Math.random()*0.03); }
}

/* ---------------- hazir desenler ---------------- */
function runScript(fn,ms){ scriptFn=fn; scriptMs=ms; lastInteraction=performance.now()+ms; }
function presetGelGit(){ clearAll(); battalGround(); let ph=0;
  runScript((now,dt)=>{ ph+=dt; const y=0.5+0.45*Math.sin(ph*2.2); const dir=Math.cos(ph*2.2)>=0?1:-1; combAt(0.5,y, 1,0, 0,dir*72); }, 2600); }
function presetSal(){ presetGelGit();
  setTimeout(()=>{ let ph=0; runScript((now,dt)=>{ ph+=dt; const x=0.5+0.45*Math.sin(ph*2.2); const dir=Math.cos(ph*2.2)>=0?1:-1; combAt(x,0.5, 0,1, dir*72,0); }, 2200); }, 2750); }
function presetBulbul(){ clearAll(); battalGround(); dropInk(0.5,0.5,current,1.2); let ph=0;
  runScript((now,dt)=>{ ph+=dt; for(let i=0;i<12;i++){ const a=i*Math.PI/6+ph*2.2, r=0.05+0.18*((ph*0.35)%1); splatVelocity(0.5+Math.cos(a)*r, 0.5+Math.sin(a)*r, -Math.sin(a)*72, Math.cos(a)*72, 1.0); } }, 2600); }

/* ---------------- otomatik akis ---------------- */
let autoFlow=false, nextDrop=1100, nextStir=2400, lastInteraction=-99999;
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function autoUpdate(now,dt){
  if(!autoFlow) return;
  if(now-lastInteraction < 2500) return;
  nextDrop -= dt*1000;
  if(nextDrop<=0){
    const x=0.22+Math.random()*0.56, y=0.26+Math.random()*0.48;
    dropMarble(x, y, INKS[(autoIdx++)%INKS.length].c, 0.05+Math.random()*0.025);
    if(audioOn) playBell();
    // arada bir nazik kavis; sonra durulur
    if(Math.random()<0.5){
      const dir = Math.random()<0.5?1:-1;
      for(let i=0;i<5;i++){
        const a=Math.random()*6.283, rr=0.12+Math.random()*0.16;
        splatVelocity(0.5+Math.cos(a)*rr, 0.5+Math.sin(a)*rr, -Math.sin(a)*dir*34, Math.cos(a)*dir*34, 2.2);
      }
    }
    nextDrop = 3400 + Math.random()*3600;
  }
}

/* ---------------- ana dongu ---------------- */
let lastT=0;
function frame(t){
  const now=t, dt=Math.min((t-lastT)/1000 || 0.016, 0.02); lastT=t;
  if(scriptFn){ scriptFn(now, dt); scriptMs-=dt*1000; if(scriptMs<=0){ scriptFn=null; lastInteraction=now; } }
  else autoUpdate(now, dt);
  step(dt);
  render();
  requestAnimationFrame(frame);
}

function uvOf(e){ const r=canvas.getBoundingClientRect(); return [ (e.clientX-r.left)/r.width, 1-(e.clientY-r.top)/r.height ]; }
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  const [u,v]=uvOf(e); pointer.down=true; pointer.lx=u; pointer.ly=v; pointer.acc=0;
  scriptFn=null; lastInteraction=performance.now(); hideHint();
  if(tool==='drop'){ dropMarble(u, v, current, 0.045+Math.random()*0.022); if(audioOn) playBell(); }

  // biz / tarak: boya EKLEMEZ, sadece var olan boyayi yayar
});
canvas.addEventListener('pointermove', e=>{
  if(!pointer.down) return;
  const [u,v]=uvOf(e);
  if(tool==='comb') combStroke(u, v, pointer.lx, pointer.ly);
  else if(tool==='biz' || tool==='flower') splatVelocity(u, v, (u-pointer.lx)*config.SPLAT_FORCE, (v-pointer.ly)*config.SPLAT_FORCE, 1.0);
  else if(tool==='drop'){ pointer.acc += Math.hypot(u-pointer.lx, v-pointer.ly); if(pointer.acc>0.055){ dropMarble(u, v, current, 0.04+Math.random()*0.02); pointer.acc=0; } }
  pointer.lx=u; pointer.ly=v; lastInteraction=performance.now();
});

canvas.addEventListener('pointercancel', ()=>{ pointer.down=false; });

let audioOn=false, AC=null, master=null;
const pentatonic=[294.66,330,392,440,523.25,587.33];
function initAudio(){
  const Ctx=window.AudioContext||window.webkitAudioContext; AC=new Ctx();
  master=AC.createGain(); master.gain.value=0; master.connect(AC.destination);
  const padGain=AC.createGain(); padGain.gain.value=0.05;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; padGain.connect(lp); lp.connect(master);
  [110,110*1.5,110*2.01].forEach((f,i)=>{ const o=AC.createOscillator(); o.type=i===0?'sine':'triangle'; o.frequency.value=f;
    const g=AC.createGain(); g.gain.value=i===0?0.6:0.25; o.connect(g); g.connect(padGain); o.start(); });
  const buf=AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate), ch=buf.getChannelData(0); let last=0;
  for(let i=0;i<ch.length;i++){ const w=(Math.random()*2-1)*0.5; last=(last+0.02*w)/1.02; ch[i]=last*3.2; }
  const noise=AC.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const nf=AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=420;
  const ng=AC.createGain(); ng.gain.value=0.04; noise.connect(nf); nf.connect(ng); ng.connect(master); noise.start();
}
function playBell(){
  if(!AC) return;
  const f=pentatonic[(Math.random()*pentatonic.length)|0];
  const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f;
  const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*2.005;
  const g=AC.createGain(); const t=AC.currentTime;
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.14,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
  const g2=AC.createGain(); g2.gain.value=0.3; o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
  o.start(t); o2.start(t); o.stop(t+1.9); o2.stop(t+1.9);
}
document.getElementById('soundTgl').addEventListener('click', function(){
  if(!AC) initAudio(); AC.resume(); audioOn=!audioOn; this.classList.toggle('on', audioOn); this.textContent=audioOn?'Açık':'Kapalı';
  master.gain.linearRampToValueAtTime(audioOn?0.55:0.0, AC.currentTime+0.6);
});

function viewSize(){
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  let w=window.innerWidth||document.documentElement.clientWidth||0;
  let h=window.innerHeight||document.documentElement.clientHeight||0;
  if(w<2||h<2){ w=1280; h=800; }
